name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  domain-tests:
    name: Domain Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run pure domain tests
        shell: bash
        run: |
          set -euo pipefail

          temp_project="$RUNNER_TEMP/DomainNUnitCheck"
          dotnet new nunit -o "$temp_project" --force
          rm "$temp_project/UnitTest1.cs"

          cp Assets/Game/Scripts/Domain/*.cs "$temp_project/"
          cp Assets/Game/Tests/EditMode/DomainRulesTests.cs "$temp_project/"

          dotnet test "$temp_project" --nologo --logger trx --results-directory "$temp_project/TestResults"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domain-test-results
          path: ${{ runner.temp }}/DomainNUnitCheck/TestResults
