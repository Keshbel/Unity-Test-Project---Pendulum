name: Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag or release name to publish.
        required: true
        default: v1.0.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-build:
    name: Windows Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-release-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ runner.os }}-release-

      - name: Build Windows player
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          targetPlatform: StandaloneWindows64
          buildsPath: build
          buildName: PendulumGridMatch

      - name: Package build
        shell: bash
        run: |
          set -euo pipefail
          cd build/StandaloneWindows64
          zip -r "../../PendulumGridMatch-Windows.zip" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PendulumGridMatch-Windows
          path: PendulumGridMatch-Windows.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Pendulum Grid Match ${{ github.event.inputs.tag || github.ref_name }}
          files: PendulumGridMatch-Windows.zip
          fail_on_unmatched_files: true
